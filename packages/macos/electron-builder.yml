appId: dev.codepop.app
productName: CodePop
directories:
  output: release
  buildResources: build
mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  target:
    - dmg
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.plist
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 450
files:
  - dist/**/*
  - package.json
extraMetadata:
  main: dist/main.js
asar: true
asarUnpack:
  - node_modules/better-sqlite3/**/*
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
npmRebuild: false
