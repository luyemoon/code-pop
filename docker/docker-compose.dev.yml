# =============================================================================
# CodePop Docker Compose - Development Configuration
# Hot reload enabled with volume mounts for source code
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL with pgvector extension
  # ---------------------------------------------------------------------------
  postgres:
    image: ankane/pgvector:pg16
    container_name: codepop-postgres-dev
    environment:
      POSTGRES_DB: codepop_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codepop123}
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # CodePop Server - Development mode with hot reload
  # ---------------------------------------------------------------------------
  codepop:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: codepop-server-dev
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-codepop123}@postgres:5432/codepop_dev
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CODEPOP_PORT: 3000
      CODEPOP_MCP_PORT: 3001
      NODE_ENV: development
      DEBUG: "codepop:*"
    volumes:
      - ../packages/server/src:/app/src
      - ../packages/core/src:/app/packages/core/src
      - ../repos:/app/repos
      - ../logs:/app/logs
    ports:
      - "3000:3000"
      - "3001:3001"
      - "9229:9229"  # Node.js debugger port
    depends_on:
      postgres:
        condition: service_healthy
    restart: no
    command: ["node", "--inspect=0.0.0.0:9229", "/app/src/index.ts"]

  # ---------------------------------------------------------------------------
  # Web Interface - Development mode with hot reload
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web.dev
    container_name: codepop-web-dev
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_WS_URL: ws://localhost:3000
    volumes:
      - ../packages/web/src:/app/src
      - ../packages/web/public:/app/public
    ports:
      - "80:80"
      - "5173:5173"  # Vite dev server
    depends_on:
      - codepop
    restart: no

  # ---------------------------------------------------------------------------
  # PgAdmin - PostgreSQL database management (optional)
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: codepop-pgadmin-dev
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@codepop.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: no

# -----------------------------------------------------------------------------
# Volumes for persistent development data
# -----------------------------------------------------------------------------
volumes:
  pgdata_dev:
    driver: local
