# =============================================================================
# CodePop Docker Compose - Production Configuration
# Optimized for production deployment with resource limits and health checks
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL with pgvector extension
  # ---------------------------------------------------------------------------
  postgres:
    image: ankane/pgvector:pg16
    container_name: codepop-postgres-prod
    environment:
      POSTGRES_DB: codepop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d codepop"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # CodePop Server - Production optimized
  # ---------------------------------------------------------------------------
  codepop:
    image: ghcr.io/codepop/server:${IMAGE_TAG:-latest}
    container_name: codepop-server-prod
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/codepop
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      CODEPOP_PORT: 3000
      CODEPOP_MCP_PORT: 3001
      NODE_ENV: production
    volumes:
      - repos_prod:/app/repos
      - logs_prod:/app/logs
    ports:
      - "3000:3000"
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Web Interface - Production optimized
  # ---------------------------------------------------------------------------
  web:
    image: ghcr.io/codepop/web:${IMAGE_TAG:-latest}
    container_name: codepop-web-prod
    volumes:
      - nginx_cache_prod:/var/cache/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - codepop
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy - Production load balancer and SSL termination
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: codepop-nginx-prod
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - nginx_cache_prod:/var/cache/nginx
      - nginx_logs_prod:/var/log/nginx
      - ./ssl:/etc/nginx/ssl:ro  # Mount SSL certificates
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
      - codepop
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# -----------------------------------------------------------------------------
# Volumes for persistent production data
# -----------------------------------------------------------------------------
volumes:
  pgdata_prod:
    driver: local
  repos_prod:
    driver: local
  logs_prod:
    driver: local
  nginx_cache_prod:
    driver: local
  nginx_logs_prod:
    driver: local
